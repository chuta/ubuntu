[build]
  base = "web"
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[build.environment]
  NODE_VERSION = "20"

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["@anthropic-ai/sdk", "@supabase/supabase-js"]

# Synchronous functions (incl. the Next.js server handler used for the inline
# AI-draft fallback) get the max synchronous budget. Long AI generation runs in
# the `generate-draft-background` background function (15-minute limit).
[functions."*"]
  timeout = 60
