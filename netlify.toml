[build]
  base = "web"
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[build.environment]
  NODE_VERSION = "20"

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["@anthropic-ai/sdk"]

# AI document generation runs synchronously inside the Next.js server function
# and is bounded under this budget (Claude call aborts at ~55s) so failures
# return a clean error instead of a platform 504.
[functions."*"]
  timeout = 60
